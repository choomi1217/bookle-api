spring:
  application:
    name: bookle
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bookle}
    username: ${DB_USER:bookle}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  sql:
    init:
      mode: never          # 수동 schema.sql 실행. ddl-auto=validate 로 스키마 검증만.

server:
  port: ${SERVER_PORT:8080}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: ${ANTHROPIC_MODEL:claude-sonnet-4-5}
  max-tokens: 500

wordbook:
  api-key: ${WORDBOOK_API_KEY:}
  cors-allowed-origins: ${WORDBOOK_CORS_ORIGINS:*}

logging:
  level:
    com.bookle: INFO
    org.hibernate.SQL: INFO

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: never

wordbook:
  api-key: test-key
